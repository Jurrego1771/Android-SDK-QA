name: Check SDK Release

on:
  schedule:
    - cron: '0 8 * * *'   # 8am UTC diario (4am hora Colombia)
  workflow_dispatch:        # permite disparar manualmente

jobs:
  check:
    name: Detectar nueva versión del SDK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Obtener última versión en Maven Central
        id: maven
        run: |
          RESPONSE=$(curl -sf \
            "https://search.maven.org/solrsearch/select?q=g:io.github.mediastream+AND+a:mediastreamplatformsdkandroid&rows=1&wt=json")
          LATEST=$(echo "$RESPONSE" | jq -r '.response.docs[0].latestVersion')
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "SDK en Maven Central: $LATEST"

      - name: Leer versión actual del proyecto
        id: current
        run: |
          # Extrae la versión del build.gradle.kts — ej: 10.0.4-alpha02
          CURRENT=$(grep -oP 'mediastreamplatformsdkandroid:\K[^"]+' app/build.gradle.kts)
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "Versión en proyecto: $CURRENT"

      - name: Comparar versiones
        id: diff
        run: |
          LATEST="${{ steps.maven.outputs.latest }}"
          CURRENT="${{ steps.current.outputs.current }}"
          echo "Maven Central : $LATEST"
          echo "Proyecto      : $CURRENT"
          if [[ "$LATEST" != "$CURRENT" && "$LATEST" != "null" && -n "$LATEST" ]]; then
            echo "changed=true"  >> "$GITHUB_OUTPUT"
            echo "new_version=$LATEST" >> "$GITHUB_OUTPUT"
            echo ">>> Nueva versión detectada: $LATEST (proyecto usa $CURRENT)"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Sin cambios."
          fi

      - name: Actualizar versión en build.gradle.kts
        if: steps.diff.outputs.changed == 'true'
        run: |
          CURRENT="${{ steps.current.outputs.current }}"
          LATEST="${{ steps.maven.outputs.latest }}"
          sed -i "s/mediastreamplatformsdkandroid:${CURRENT}/mediastreamplatformsdkandroid:${LATEST}/" \
            app/build.gradle.kts
          echo "build.gradle.kts actualizado: $CURRENT → $LATEST"

      - name: Commit la nueva versión
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts
          git commit -m "chore(sdk): bump SDK ${{ steps.current.outputs.current }} → ${{ steps.diff.outputs.new_version }}"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # El push del commit de arriba dispara el workflow sdk-qa.yml automáticamente
      # (trigger: push a main). No hace falta workflow_dispatch explícito.
