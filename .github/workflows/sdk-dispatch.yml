name: SDK Change QA (cross-repo)

# Disparado por el repo del SDK vía repository_dispatch (ver docs/integrations/sdk-side-trigger.yml).
# - sdk-pr   : se abrió/actualizó un PR hacia la rama de release del SDK
# - sdk-push : push directo a la rama de release del SDK
# Corre en el runner self-hosted (TU PC, con el device) el pipeline dirigido por el DIFF real del SDK.
on:
  repository_dispatch:
    types: [sdk-pr, sdk-push]
  workflow_dispatch:        # disparo manual de prueba (usa los inputs de abajo)
    inputs:
      event:   { description: 'pr | push', required: true, default: 'pr' }
      pr:      { description: 'PR number (si event=pr)', required: false }
      base:    { description: 'base sha (si event=push)', required: false }
      head:    { description: 'head sha (si event=push)', required: false }
      version: { description: 'versión SDK a probar (opcional)', required: false }

concurrency:
  group: sdk-dispatch-${{ github.ref }}
  cancel-in-progress: false   # no cancelar un pipeline a medias (corre tests en device)

jobs:
  sdk-qa:
    name: QA dirigido por cambio en el SDK
    runs-on: self-hosted
    timeout-minutes: 90
    env:
      JAVA_HOME: C:\actions-runner\_work\_tool\Java_Temurin-Hotspot_jdk\17.0.18-8\x64
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}                 # gh pr create en ESTE repo (QA)
      # Token con lectura del repo del SDK (para fetch-sdk-diff). Si el SDK es público, basta gh del runner.
      GITHUB_TOKEN: ${{ secrets.SDK_READ_TOKEN }}
      # Payload → variables del pipeline. repository_dispatch trae client_payload; workflow_dispatch, inputs.
      SDK_EVENT:    ${{ github.event.client_payload.event   || github.event.inputs.event }}
      SDK_REPO:     ${{ github.event.client_payload.repo    || vars.SDK_REPO }}
      SDK_REF:      ${{ github.event.client_payload.ref     || '' }}
      SDK_PR_NUMBER: ${{ github.event.client_payload.pr_number || github.event.inputs.pr }}
      SDK_BASE_SHA: ${{ github.event.client_payload.base_sha || github.event.inputs.base }}
      SDK_HEAD_SHA: ${{ github.event.client_payload.head_sha || github.event.inputs.head }}
      SDK_VERSION:  ${{ github.event.client_payload.version || github.event.inputs.version }}

    steps:
      - name: Checkout (repo QA)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fijar autocrlf
        shell: pwsh
        run: git config --global core.autocrlf false

      - name: Crear local.properties
        shell: pwsh
        run: '"sdk.dir=C\:\\Users\\Neo\\AppData\\Local\\Android\\Sdk" | Out-File local.properties -Encoding utf8 -NoNewline'

      - name: npm install (scripts — octokit para fetch-sdk-diff)
        shell: pwsh
        run: |
          if (Test-Path scripts/package.json) { npm --prefix scripts install --no-audit --no-fund }

      - name: Ejecutar pipeline (diff del SDK → tests → PR)
        shell: pwsh
        run: |
          $env:PATH = "C:\Users\Neo\AppData\Local\Android\Sdk\platform-tools;C:\Program Files\Git\usr\bin;C:\ProgramData\chocolatey\bin;$env:PATH"
          & "C:\Program Files\Git\bin\bash.exe" -c "bash scripts/run-sdk-pipeline.sh"
          # exit 4 (no en Maven) es resultado válido, no fallo de CI
          if ($LASTEXITCODE -eq 4) { exit 0 }
          exit $LASTEXITCODE

      - name: Subir artefactos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sdk-qa-${{ github.run_number }}
          path: |
            ai-output/diff.txt
            ai-output/diff-meta.txt
            ai-output/analysis.md
            ai-output/strategy.md
            ai-output/exploration.md
            ai-output/test-analysis-report.md
            ai-output/session-diff.md
            ai-output/version-comparison-report.md
            ai-output/report/
          retention-days: 30
          if-no-files-found: ignore
