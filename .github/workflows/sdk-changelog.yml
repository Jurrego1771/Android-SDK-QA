name: SDK Changelog QA

# Gatillador: push que toca el changelog del SDK versionado en el repo QA.
# Alguien sube/actualiza sdk-changelog/ (version.txt + CHANGELOG.md) → corre el pipeline.
# Un guard (detect-changelog-change.sh) corta si la versión no cambió realmente.
on:
  push:
    branches: [main]
    paths:
      - 'sdk-changelog/**'
  workflow_dispatch: {}   # también a demanda

# Mutex compartido del device A53 (mismo grupo en sdk-qa / sdk-maven-watch) → serialización
# explícita entre los 3 workflows que tocan el device. No cancelar un pipeline a medias.
concurrency:
  group: device-a53
  cancel-in-progress: false

jobs:
  changelog-qa:
    name: Pipeline QA dirigido por changelog
    runs-on: [self-hosted, mac-mini]
    timeout-minutes: 90
    permissions:
      contents: write

    env:
      JAVA_HOME: /Library/Java/JavaVirtualMachines/zulu-17.jdk/Contents/Home
      ANDROID_HOME: /Users/juliourrego/Library/Android/sdk
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Guard — ¿cambió la versión del changelog?
        id: guard
        run: |
          bash scripts/detect-changelog-change.sh && code=0 || code=$?
          if [[ $code -eq 3 ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          elif [[ $code -eq 0 ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            exit $code
          fi

      - name: Crear local.properties
        if: steps.guard.outputs.changed == 'true'
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Permisos gradlew
        if: steps.guard.outputs.changed == 'true'
        run: chmod +x gradlew

      - name: Ejecutar pipeline (changelog → tests → PR)
        if: steps.guard.outputs.changed == 'true'
        run: |
          export PATH="$ANDROID_HOME/platform-tools:/opt/homebrew/bin:$PATH"
          export REPORT_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          bash scripts/run-changelog-pipeline.sh || code=$?
          # exit 3 (no-op) y 4 (no en Maven) son resultados válidos, no fallos de CI
          [[ "${code:-0}" -eq 3 || "${code:-0}" -eq 4 ]] && exit 0
          exit "${code:-0}"

      - name: Publicar reporte a GitHub Pages
        if: always() && steps.guard.outputs.changed == 'true'
        run: |
          [[ -f ai-output/report/index.html ]] || exit 0
          bash scripts/publish-report-pages.sh ai-output/report \
            "changelog run ${{ github.run_number }}"

      - name: Subir artefactos del pipeline
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: changelog-qa-${{ github.run_number }}
          path: |
            ai-output/analysis.md
            ai-output/strategy.md
            ai-output/exploration.md
            ai-output/test-analysis-report.md
            ai-output/session-diff.md
            ai-output/version-comparison-report.md
            ai-output/report/
          retention-days: 30
          if-no-files-found: ignore
