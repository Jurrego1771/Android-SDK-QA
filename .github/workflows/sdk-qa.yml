name: SDK QA

on:
  # Cada push a main — build fresco + tests medium (~8 min)
  push:
    branches: [main]

  # Nightly 2am — suite completa
  schedule:
    - cron: '0 2 * * *'

  # Manual con parámetros
  workflow_dispatch:
    inputs:
      size:
        description: 'Tamaño de tests'
        required: false
        default: 'all'
        type: choice
        options: [medium, large, all]
      target:
        description: 'Target de dispositivo'
        required: false
        default: 'all'
        type: choice
        options: [mobile, tv, all]
      skip_build:
        description: 'Saltar build Gradle (usar APK existente)'
        required: false
        default: false
        type: boolean

# Cancelar runs anteriores del mismo branch si llega uno nuevo
concurrency:
  group: sdk-qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ github.event_name == 'schedule' && 'Nightly — Suite completa' || github.event_name == 'push' && 'Push — Tests rápidos' || 'Manual' }}
    runs-on: self-hosted
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Determinar parámetros del run
        id: params
        shell: pwsh
        run: |
          $event = "${{ github.event_name }}"
          if ($event -eq "push") {
            "size=medium"   | Out-File $env:GITHUB_OUTPUT -Append
            "target=all"    | Out-File $env:GITHUB_OUTPUT -Append
            "skip_build="   | Out-File $env:GITHUB_OUTPUT -Append
          } elseif ($event -eq "schedule") {
            "size=all"      | Out-File $env:GITHUB_OUTPUT -Append
            "target=all"    | Out-File $env:GITHUB_OUTPUT -Append
            "skip_build="   | Out-File $env:GITHUB_OUTPUT -Append
          } else {
            "size=${{ github.event.inputs.size }}"     | Out-File $env:GITHUB_OUTPUT -Append
            "target=${{ github.event.inputs.target }}" | Out-File $env:GITHUB_OUTPUT -Append
            $skip = if ("${{ github.event.inputs.skip_build }}" -eq "true") { "--skip-build" } else { "" }
            "skip_build=$skip" | Out-File $env:GITHUB_OUTPUT -Append
          }

      - name: Normalizar line endings de scripts
        shell: cmd
        run: git config core.autocrlf false && git checkout -- scripts/

      - name: Ejecutar tests
        shell: cmd
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: >
          bash scripts/run-tests.sh
          --target "${{ steps.params.outputs.target }}"
          --size "${{ steps.params.outputs.size }}"
          ${{ steps.params.outputs.skip_build }}

      - name: Subir reporte HTML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sdk-qa-report-${{ github.run_number }}
          path: ai-output/report/
          retention-days: 30

      - name: Subir raw de instrumentación
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: instrument-raw-${{ github.run_number }}
          path: ai-output/instrument-raw.txt
          retention-days: 7
