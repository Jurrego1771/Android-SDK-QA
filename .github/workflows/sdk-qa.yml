name: SDK QA

on:
  # Cada push a main — build fresco + tests medium (~8 min)
  push:
    branches: [main]

  # Nightly 2am — suite completa
  schedule:
    - cron: '0 2 * * *'

  # Manual con parámetros
  workflow_dispatch:
    inputs:
      size:
        description: 'Tamaño de tests'
        required: false
        default: 'all'
        type: choice
        options: [medium, large, all]
      target:
        description: 'Target de dispositivo'
        required: false
        default: 'all'
        type: choice
        options: [mobile, tv, all]
      skip_build:
        description: 'Saltar build Gradle (usar APK existente)'
        required: false
        default: false
        type: boolean

# Cancelar runs anteriores del mismo branch si llega uno nuevo
concurrency:
  group: sdk-qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ github.event_name == 'schedule' && 'Nightly — Suite completa' || github.event_name == 'push' && 'Push — Tests rápidos' || 'Manual' }}
    runs-on: self-hosted
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Determinar parámetros del run
        id: params
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "size=medium"   >> $GITHUB_OUTPUT
            echo "target=all"    >> $GITHUB_OUTPUT
            echo "skip_build="   >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "size=all"      >> $GITHUB_OUTPUT
            echo "target=all"    >> $GITHUB_OUTPUT
            echo "skip_build="   >> $GITHUB_OUTPUT
          else
            echo "size=${{ github.event.inputs.size }}"     >> $GITHUB_OUTPUT
            echo "target=${{ github.event.inputs.target }}" >> $GITHUB_OUTPUT
            SKIP="${{ github.event.inputs.skip_build }}"
            echo "skip_build=$( [[ "$SKIP" == "true" ]] && echo '--skip-build' || echo '' )" >> $GITHUB_OUTPUT
          fi

      - name: Ejecutar tests
        shell: bash
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          bash scripts/run-tests.sh \
            --target "${{ steps.params.outputs.target }}" \
            --size   "${{ steps.params.outputs.size }}" \
            ${{ steps.params.outputs.skip_build }}

      - name: Subir reporte HTML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sdk-qa-report-${{ github.run_number }}
          path: ai-output/report/
          retention-days: 30

      - name: Subir raw de instrumentación
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: instrument-raw-${{ github.run_number }}
          path: ai-output/instrument-raw.txt
          retention-days: 7
