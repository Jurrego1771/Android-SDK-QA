name: SDK QA

on:
  push:
    branches: [main]
    paths:
      - 'app/src/**'
      - 'app/build.gradle.kts'
      - 'build.gradle.kts'
      - 'gradle.properties'
      - 'gradle/**'
      - 'scripts/**'
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      size:
        description: 'Tamaño de tests'
        required: false
        default: 'all'
        type: choice
        options: [medium, large, all]
      target:
        description: 'Target de dispositivo'
        required: false
        default: 'all'
        type: choice
        options: [mobile, tv, all]
      skip_build:
        description: 'Saltar build Gradle (usar APK existente)'
        required: false
        default: false
        type: boolean

concurrency:
  group: device-a53
  cancel-in-progress: false

jobs:
  test:
    name: ${{ github.event_name == 'schedule' && 'Nightly — Suite completa' || github.event_name == 'push' && 'Push — Tests rápidos' || 'Manual' }}
    runs-on: [self-hosted, mac-mini]
    timeout-minutes: 60
    permissions:
      contents: write

    env:
      JAVA_HOME: /Library/Java/JavaVirtualMachines/zulu-17.jdk/Contents/Home
      ANDROID_HOME: /Users/juliourrego/Library/Android/sdk
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # Locale UTF-8: el /bin/bash 3.2 de macOS mis-parsea los caracteres multibyte de los scripts
      # (cajas ═╚╝, ✗, —) bajo locale C → "unexpected EOF looking for matching quote". Forzar UTF-8.
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determinar parámetros del run
        id: params
        run: |
          case "${{ github.event_name }}" in
            push)
              echo "size=medium"   >> "$GITHUB_OUTPUT"
              echo "target=all"    >> "$GITHUB_OUTPUT"
              echo "skip_build="   >> "$GITHUB_OUTPUT"
              ;;
            schedule)
              echo "size=all"      >> "$GITHUB_OUTPUT"
              echo "target=mobile" >> "$GITHUB_OUTPUT"
              echo "skip_build="   >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "size=${{ github.event.inputs.size }}"     >> "$GITHUB_OUTPUT"
              echo "target=${{ github.event.inputs.target }}" >> "$GITHUB_OUTPUT"
              skip=""
              [[ "${{ github.event.inputs.skip_build }}" == "true" ]] && skip="--skip-build"
              echo "skip_build=$skip" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Crear local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Permisos gradlew
        run: chmod +x gradlew

      - name: Ejecutar tests
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          export PATH="$ANDROID_HOME/platform-tools:/opt/homebrew/bin:$PATH"
          export REPORT_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          bash scripts/run-tests.sh \
            --target "${{ steps.params.outputs.target }}" \
            --size "${{ steps.params.outputs.size }}" \
            ${{ steps.params.outputs.skip_build }}

      - name: Publicar reporte a GitHub Pages
        if: always()
        run: |
          [[ -f ai-output/report/index.html ]] || exit 0
          bash scripts/publish-report-pages.sh ai-output/report \
            "run ${{ github.run_number }} - ${{ github.event_name }}"

      - name: Subir reporte HTML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sdk-qa-report-${{ github.run_number }}
          path: ai-output/report/
          retention-days: 30

      - name: Subir raw de instrumentación
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: instrument-raw-${{ github.run_number }}
          path: ai-output/instrument-raw.txt
          retention-days: 7
