name: SDK QA

on:
  # Solo cuando cambia código relevante — ignora docs, workflows, etc.
  push:
    branches: [main]
    paths:
      - 'app/src/**'
      - 'app/build.gradle.kts'
      - 'build.gradle.kts'
      - 'gradle.properties'
      - 'gradle/**'
      - 'scripts/**'

  # Nightly 2am — suite completa SOLO en móvil (sin filtro de paths).
  # Los nocturnos en TV (BRAVIA por WiFi) se retiraron: la TV no está siempre conectada y
  # genera falsos rojos. Para correr en TV: workflow_dispatch con target=tv a demanda.
  schedule:
    - cron: '0 2 * * *'

  # Manual con parámetros
  workflow_dispatch:
    inputs:
      size:
        description: 'Tamaño de tests'
        required: false
        default: 'all'
        type: choice
        options: [medium, large, all]
      target:
        description: 'Target de dispositivo'
        required: false
        default: 'all'
        type: choice
        options: [mobile, tv, all]
      skip_build:
        description: 'Saltar build Gradle (usar APK existente)'
        required: false
        default: false
        type: boolean

# Mutex del device físico: los 3 workflows que tocan el A53 comparten ESTE grupo (string global
# en GitHub Actions) → se serializan entre sí de forma explícita, sin depender de que haya 1 solo
# runner. cancel-in-progress: false = nunca cortar un QA a medias en el device (se encolan).
concurrency:
  group: device-a53
  cancel-in-progress: false

jobs:
  test:
    name: ${{ github.event_name == 'schedule' && 'Nightly — Suite completa' || github.event_name == 'push' && 'Push — Tests rápidos' || 'Manual' }}
    runs-on: [self-hosted, mac-mini]
    timeout-minutes: 60
    permissions:
      contents: write          # push del reporte a la rama gh-pages

    env:
      JAVA_HOME: C:\actions-runner\_work\_tool\Java_Temurin-Hotspot_jdk\17.0.18-8\x64
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fijar autocrlf en git del runner
        shell: pwsh
        run: git config --global core.autocrlf false

      - name: Determinar parámetros del run
        id: params
        shell: pwsh
        run: |
          $event = "${{ github.event_name }}"
          if ($event -eq "push") {
            "size=medium"   | Out-File $env:GITHUB_OUTPUT -Append
            "target=all"    | Out-File $env:GITHUB_OUTPUT -Append
            "skip_build="   | Out-File $env:GITHUB_OUTPUT -Append
          } elseif ($event -eq "schedule") {
            "size=all"      | Out-File $env:GITHUB_OUTPUT -Append
            "target=mobile" | Out-File $env:GITHUB_OUTPUT -Append   # nightly SOLO móvil (sin TV)
            "skip_build="   | Out-File $env:GITHUB_OUTPUT -Append
          } else {
            "size=${{ github.event.inputs.size }}"     | Out-File $env:GITHUB_OUTPUT -Append
            "target=${{ github.event.inputs.target }}" | Out-File $env:GITHUB_OUTPUT -Append
            $skip = if ("${{ github.event.inputs.skip_build }}" -eq "true") { "--skip-build" } else { "" }
            "skip_build=$skip" | Out-File $env:GITHUB_OUTPUT -Append
          }

      - name: Crear local.properties
        shell: pwsh
        run: |
          "sdk.dir=C\:\\Users\\Neo\\AppData\\Local\\Android\\Sdk" `
            | Out-File local.properties -Encoding utf8 -NoNewline

      - name: Fijar line endings y ejecutar tests
        shell: pwsh
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          $env:PATH = "C:\Users\Neo\AppData\Local\Android\Sdk\platform-tools;C:\Program Files\Git\usr\bin;C:\ProgramData\chocolatey\bin;$env:PATH"
          # URL fija de Pages → run-tests.sh la pasa al botón de Slack (owner en minúsculas).
          $owner = "${{ github.repository_owner }}".ToLower()
          $env:REPORT_URL = "https://$owner.github.io/${{ github.event.repository.name }}/"
          & "C:\Program Files\Git\bin\bash.exe" -c "bash scripts/run-tests.sh --target '${{ steps.params.outputs.target }}' --size '${{ steps.params.outputs.size }}' ${{ steps.params.outputs.skip_build }}"
          exit $LASTEXITCODE

      - name: Publicar reporte a GitHub Pages (URL fija, force-orphan)
        if: always()
        shell: pwsh
        run: |
          $env:PATH = "C:\Program Files\Git\usr\bin;$env:PATH"
          if (Test-Path ai-output/report/index.html) {
            & "C:\Program Files\Git\bin\bash.exe" -c "bash scripts/publish-report-pages.sh ai-output/report 'run ${{ github.run_number }} - ${{ github.event_name }}'"
          } else { Write-Host 'sin ai-output/report/index.html — nada que publicar' }

      - name: Subir reporte HTML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sdk-qa-report-${{ github.run_number }}
          path: ai-output/report/
          retention-days: 30

      - name: Subir raw de instrumentación
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: instrument-raw-${{ github.run_number }}
          path: ai-output/instrument-raw.txt
          retention-days: 7
