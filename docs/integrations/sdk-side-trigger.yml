# ============================================================================
# QA-trigger.yml  —  COLOCAR EN EL REPO DEL SDK: .github/workflows/QA-trigger.yml
#
# Dispara el pipeline de QA caja-negra (repo Android-SDK-QA, runner self-hosted) cuando cambia el
# código del SDK en la rama de release. NO corre tests aquí: solo notifica al repo QA vía
# repository_dispatch, pasándole el CONTEXTO del cambio (PR nº o rango de commits) para que el QA
# obtenga el diff REAL y ejecute analyze → explore(MCP) → generate → run en device → report → PR.
#
# Requisito (una sola vez): crear el secret QA_DISPATCH_TOKEN en ESTE repo (el del SDK).
#   Ver docs/integrations/README-sdk-trigger.md en el repo QA para los pasos exactos del token.
# ============================================================================
name: Trigger QA on SDK change

on:
  pull_request:
    branches: ['10.0.x', 'release/**']   # ← ajustar a las ramas de release reales del SDK
    types: [opened, synchronize, reopened]
  push:
    branches: ['10.0.x', 'release/**']   # ← ídem

# Repo QA destino. Cambiar si el repo QA se renombra/mueve.
env:
  QA_REPO: Jurrego1771/Android-SDK-QA

jobs:
  notify-qa:
    runs-on: ubuntu-latest      # job liviano: solo manda el dispatch (no compila el SDK)
    steps:
      - name: Disparar QA (PR)
        if: github.event_name == 'pull_request'
        run: |
          curl -sf -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.QA_DISPATCH_TOKEN }}" \
            "https://api.github.com/repos/${QA_REPO}/dispatches" \
            -d @- <<JSON
          {
            "event_type": "sdk-pr",
            "client_payload": {
              "event": "pr",
              "repo": "${{ github.repository }}",
              "ref": "${{ github.event.pull_request.base.ref }}",
              "pr_number": "${{ github.event.pull_request.number }}"
            }
          }
          JSON

      - name: Disparar QA (push)
        if: github.event_name == 'push'
        run: |
          curl -sf -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.QA_DISPATCH_TOKEN }}" \
            "https://api.github.com/repos/${QA_REPO}/dispatches" \
            -d @- <<JSON
          {
            "event_type": "sdk-push",
            "client_payload": {
              "event": "push",
              "repo": "${{ github.repository }}",
              "ref": "${{ github.ref_name }}",
              "base_sha": "${{ github.event.before }}",
              "head_sha": "${{ github.event.after }}"
            }
          }
          JSON
