version: "1.0"
module: drm
last_updated: "2026-06-23"

internal:
  - id: drm-data
    reason: >
      DrmData(drmUrl, drmHeaders) en MediastreamPlayerConfig.
      drmUrl es la URL del servidor de licencias Axinom.
      Headers contienen X-AxDRM-Message con el JWT.
    coupling: high
    files:
      - MediastreamPlayerConfig.kt (DrmData class)

  - id: drm-configuration
    reason: >
      El SDK configura DrmConfiguration.Builder("widevine") con
      licenseUri y licenseRequestHeaders.
    coupling: high
    files:
      - MediastreamPlayer.kt (drm configuration code)

  - id: media-source-factory
    reason: >
      DrmSessionManagerProvider se crea en createMediaSourceFactory
      y se pasa a DefaultMediaSourceFactory.
    coupling: medium
    files:
      - MediastreamPlayer.kt

external:
  - id: media3-exoplayer
    package: "androidx.media3:media3-exoplayer:1.5.0"
    reason: >
      ExoPlayer/Media3 maneja la negociacion de licencia Widevine.
      DrmSessionManager integrado via DrmSessionManagerProvider.
    coupling: high
    risk: high

  - id: axinom
    package: "Axinom DRM License Server"
    reason: >
      Proveedor de licencias usado en QA. URL:
      d231f6fd.drm-widevine-licensing.axprod.net/AcquireLicense
    coupling: external
    risk: high
