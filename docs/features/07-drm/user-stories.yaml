version: "1.0"
module: drm
last_updated: "2026-06-23"

user_stories:

  - id: DRM-US-001
    persona: Viewer
    narrative:
      as: "espectador de contenido protegido"
      want: "que el SDK obtenga la licencia Widevine automaticamente"
      so_that: "pueda ver contenido DRM sin hacer nada especial"
    business_value: HIGH
    risk_area:
      - drm
    related_features:
      - video-vod
      - video-live
    acceptance:
      - DRM-AC-001
    notes: >
      El SDK delega a ExoPlayer. Solo Widevine L1/L3 soportado.

  - id: DRM-US-002
    persona: Integrator
    narrative:
      as: "integrador de contenido premium"
      want: "configurar license URL y headers de autorizacion"
      so_that: "el servidor de licencias puede validar el acceso del usuario"
    business_value: HIGH
    risk_area:
      - drm
    acceptance:
      - DRM-AC-002
    notes: >
      DrmData(licenseUrl, headers). Headers tipicamente son un JWT de Axinom.

  - id: DRM-US-003
    persona: Integrator
    narrative:
      as: "integrador QA"
      want: "verificar que el token DRM no esta vencido"
      so_that: "los tests de DRM no fallen por token expirado"
    business_value: MEDIUM
    risk_area:
      - drm
    acceptance:
      - DRM-AC-003
    notes: >
      El token JWT tiene expiration_date. Tokens vencidos producen error 4032.
