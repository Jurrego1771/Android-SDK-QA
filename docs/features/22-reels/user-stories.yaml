version: "2.0"
module: reels
last_updated: "2026-06-23"

# ─────────────────────────────────────────────────────────────────────────────
# SCHEMA (referencia canónica — propagar a las demás features)
#
# Cada user story lleva sus criterios de aceptación INLINE (no en un archivo
# aparte). El criterio es la fuente de verdad del comportamiento esperado.
#
#   - id: <MOD>-US-NNN
#     persona: Viewer | Publisher | Integrator
#     narrative: { as, want, so_that }
#     business_value: HIGH | MEDIUM | LOW
#     risk_area: [ ... ]
#     related_features: [ ... ]        # opcional
#     notes: >                         # opcional
#     acceptance:                      # 1..N criterios, given/when/then
#       - id: <MOD>-AC-NNN
#         priority: MUST | SHOULD | COULD
#         given: "estado inicial"
#         when:  "acción"
#         then:  [ "resultado verificable", ... ]
#         covered_by: [ <test ids> ]   # [] = gap (lo reporta tests.yaml)
#
# Trazabilidad: US → AC (aquí) → test (tests.yaml referencia el AC id).
# El .md es solo narrativa (descripción/config/arquitectura), NO repite esto.
# ─────────────────────────────────────────────────────────────────────────────

user_stories:

  - id: REELS-US-001
    persona: Viewer
    narrative:
      as: "espectador de contenido corto vertical"
      want: "navegar un feed de reels con swipe vertical"
      so_that: "puedo consumir contenido corto estilo TikTok de forma fluida"
    business_value: HIGH
    risk_area:
      - reels
    related_features:
      - video-vod
    notes: >
      ViewPager2 vertical con pool de 6 ExoPlayers reutilizables (preloadDistance=2).
    acceptance:
      - id: REELS-AC-001
        priority: MUST
        given: "un player de reels (playerSkin=reels / type=REELS) con playerId e id del primer reel"
        when: "se abre el feed (sdkqa://scenario/reels)"
        then:
          - "el primer reel hace autoplay: onReady seguido de onPlay"
          - "la orientación se fuerza a PORTRAIT"
        covered_by: []

      - id: REELS-AC-002
        priority: MUST
        given: "el feed reproduciendo el reel N"
        when: "el usuario hace swipe vertical hacia arriba"
        then:
          - "se dispara onPause (reel N) → onNext → onPlay (reel N+1)"
          - "el siguiente reel ya estaba precargado (transición sin recarga visible)"
        covered_by: []

      - id: REELS-AC-003
        priority: MUST
        given: "el feed reproduciendo el reel N (N>0)"
        when: "el usuario hace swipe vertical hacia abajo"
        then:
          - "se dispara onPrevious y reproduce el reel N-1"
        covered_by: []

      - id: REELS-AC-004
        priority: MUST
        given: "el feed con reels precargados fuera de pantalla"
        when: "se observan los callbacks del SDK"
        then:
          - "solo el reel activo (isActiveReel) emite onReady/onPlay/onPause/onBuffering/onEnd"
          - "los reels precargados NO emiten callbacks"
        covered_by: []

      - id: REELS-AC-005
        priority: MUST
        given: "un playerId válido y un feed con related reels disponibles"
        when: "el usuario hace varios swipes acercándose al final de lo precargado"
        then:
          - "el SDK pide el siguiente batch (related reels API) cuando nonAdItemsAhead < preloadDistance"
          - "el feed sigue avanzando (scroll efectivamente continuo)"
        covered_by: []
        notes: "Sin playerId el feed no pagina (REELS-RISK-001)."

  - id: REELS-US-002
    persona: Viewer
    narrative:
      as: "espectador"
      want: "que cada reel haga loop automaticamente"
      so_that: "el contenido se reproduce continuamente"
    business_value: HIGH
    risk_area:
      - reels
    notes: >
      REPEAT_MODE_ONE. No auto-avanza al siguiente.
    acceptance:
      - id: REELS-AC-006
        priority: MUST
        given: "un reel reproduciéndose en foco"
        when: "el reel llega al final"
        then:
          - "el mismo reel reinicia (loop) — no se auto-avanza al siguiente"
          - "NO se dispara onNext (el avance solo ocurre por swipe del usuario)"
        covered_by: []

  - id: REELS-US-003
    persona: Viewer
    narrative:
      as: "espectador"
      want: "controlar audio y reproduccion con gestos simples"
      so_that: "puedo manejar la experiencia sin una UI compleja"
    business_value: MEDIUM
    risk_area:
      - reels
    notes: >
      Mute global al feed (ReelsPreferencesManager, arranca con sonido). Tap = play/pause.
    acceptance:
      - id: REELS-AC-007
        priority: SHOULD
        given: "el feed reproduciendo con sonido (isMuted=false por defecto)"
        when: "el usuario toca el botón mute (arriba-derecha) y luego hace swipe a otro reel"
        then:
          - "el audio se silencia globalmente (todos los players del feed)"
          - "el estado de mute se mantiene al cambiar de reel"
        covered_by: []

      - id: REELS-AC-008
        priority: SHOULD
        given: "un reel reproduciéndose"
        when: "el usuario toca el área del video"
        then:
          - "si estaba reproduciendo → pausa (onPause)"
          - "si estaba pausado → reproduce (onPlay)"
        covered_by: []

      - id: REELS-AC-009
        priority: COULD
        given: "un reel reproduciéndose"
        when: "el usuario intenta arrastrar la barra de progreso"
        then:
          - "la barra es visible pero NO seekeable (scrubber deshabilitado)"
        covered_by: []

  - id: REELS-US-004
    persona: Viewer
    narrative:
      as: "espectador"
      want: "cerrar el feed de reels"
      so_that: "puedo volver a la app"
    business_value: MEDIUM
    risk_area:
      - reels
    acceptance:
      - id: REELS-AC-010
        priority: MUST
        given: "el feed de reels abierto"
        when: "el usuario toca el botón dismiss (arriba-izquierda)"
        then:
          - "se dispara onDismissButton"
          - "el feed se cierra y vuelve a la pantalla anterior"
        covered_by: []
