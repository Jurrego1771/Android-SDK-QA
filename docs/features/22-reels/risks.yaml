version: "1.0"
module: reels
last_updated: "2026-06-23"

risks:

  - id: REELS-RISK-001
    severity: high
    title: "playerId es obligatorio pero no se valida"
    description: >
      playerId es obligatorio para paginar el feed (endpoint de related reels).
      Sin el, el feed no puede paginar. No hay validacion explicita.
    affected_files:
      - "ReelsV2Handler.kt"
    trigger: "Config sin playerId en modo reels"
    mitigation: >
      El integrador debe asegurar que playerId esta presente.
    test_priority: MUST

  - id: REELS-RISK-002
    severity: medium
    title: "Pool de 6 players: memoria vs rendimiento"
    description: >
      6 ExoPlayers en RAM consume memoria. En dispositivos limitados,
      esto podria causar OOM.
    affected_files:
      - "PlayerPool.kt"
    trigger: "Dispositivos con RAM limitada"
    mitigation: >
      El numero de players es fijo (6). Monitorear uso de memoria.
    test_priority: SHOULD

  - id: REELS-RISK-003
    severity: medium
    title: "Callbacks solo para reel activo: integrador puede confundirse"
    description: >
      Callbacks solo se disparan para el reel en foco. Los otros 5
      players no emiten eventos. Un integrador que no entienda esto
      podria asumir que los callbacks funcionan igual que en player normal.
    affected_files:
      - "ReelsV2Handler.kt"
    trigger: "Integrador suscribe callbacks esperando eventos de todos los reels"
    mitigation: >
      Documentar que callbacks son solo para el reel activo.
    test_priority: SHOULD

  - id: REELS-RISK-004
    severity: low
    title: "ReelsPreferencesManager no es persistente"
    description: >
      Preferencias (isMuted, isMetadataVisible) son en memoria.
      Se pierden al cerrar la app.
    affected_files:
      - "ReelsPreferencesManager.kt"
    trigger: "Usuario espera que el mute persista entre sesiones"
    mitigation: >
      No es persistente por diseño.
    test_priority: COULD
