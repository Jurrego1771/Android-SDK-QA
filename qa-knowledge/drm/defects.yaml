defects:

  - id: DRM-DEF-001
    status: known_limitation
    severity: high
    title: "Token Axinom expirado en el código QA"
    description: >
      El token JWT hardcodeado en VideoLiveScenarioActivity expiró en 2026-04-23T18:39:15Z.
      El servidor Axinom retorna error 4032. Regenerar token con fecha de expiración futura.
    affected_files:
      - "VideoLiveScenarioActivity.kt:14 (DRM_ACCESS_TOKEN)"
    trigger: "Construir player con token vencido"
    workaround: "Regenerar el JWT con expiration_date futura."
    regression_risk: high
    ac_ref: DRM-AC-003
    source: "Documentado en rules.md §3 y §5 (token vencido → error 4032)."
    validation_status: confirmed

  - id: DRM-DEF-002
    status: known_limitation
    severity: medium
    title: "Emuladores solo soportan Widevine L3"
    description: >
      Los emuladores solo tienen L3 (software). Streams con política L1 requieren hardware
      certificado. Tests DRM completos necesitan dispositivo físico.
    affected_files:
      - "MediastreamPlayer.kt (DrmSessionManager)"
    trigger: "Probar DRM en emulador con stream L1"
    workaround: "Usar dispositivo físico o stream L3."
    regression_risk: low
    ac_ref: DRM-AC-001
    validation_status: confirmed
