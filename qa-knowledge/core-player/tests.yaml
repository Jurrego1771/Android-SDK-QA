coverage_gaps:

  - id: GAP-CORE-001
    priority: MUST
    ac_ref: CORE-AC-002
    title: "Constructor estándar rechaza Context no-Activity"
    suggested_spec: "integration/PlayerConstructorTest.kt"
    notes: >
      Pasar un Context (no Activity) al constructor estándar y verificar que se lanza
      IllegalArgumentException con el mensaje esperado (BR-CORE-001).

  - id: GAP-CORE-002
    priority: MUST
    ac_ref: CORE-AC-010
    title: "getVersion() retorna '10.0.8-alpha01'"
    suggested_spec: "integration/PlayerInfoTest.kt"
    notes: >
      Test trivial pero útil como tripwire: si Mediastream actualiza el SDK sin
      tocar el literal hardcodeado (BR-CORE-025), este test lo detecta.

  - id: GAP-CORE-003
    priority: MUST
    ac_ref: CORE-AC-008
    title: "El idioma de la UI se aplica desde config.language (es/en/pt)"
    suggested_spec: "integration/PlayerLanguageTest.kt"
    notes: >
      Construir con language=SPANISH y verificar que un string visible del player
      (ej. tooltip de un control) está en español. Recordar: default real es ENGLISH.

  - id: GAP-CORE-004
    priority: MUST
    ac_ref: CORE-AC-011
    title: "reloadPlayer(newConfig) cambia el idioma de la UI"
    suggested_spec: "integration/PlayerLanguageTest.kt"
    notes: >
      Inicializar en ENGLISH, llamar reloadPlayer con language=SPANISH y verificar
      el cambio (BR-CORE-010). Documenta que language NO es un flag persistente.

  - id: GAP-CORE-005
    priority: SHOULD
    ac_ref: CORE-AC-012
    title: "changeSpeed cambia la velocidad de reproducción"
    suggested_spec: "integration/PlaybackControlTest.kt"
    notes: >
      Medir el avance de getCurrentPosition tras changeSpeed(2.0f) en una ventana
      de tiempo conocida. No valida rango: probar también un valor extremo.

  - id: GAP-CORE-006
    priority: SHOULD
    ac_ref: [CORE-AC-014, CORE-AC-015]
    title: "Getters degradan a 0 sin lanzar antes de READY"
    suggested_spec: "integration/PlayerGettersTest.kt"
    notes: >
      Llamar getHeight/getBitrate/getBandwidth/getCurrentPosition/getDuration/
      getContentDuration inmediatamente tras construir (antes de onReady) y verificar
      que retornan 0/0L sin excepción (BR-CORE-007/008).

  - id: GAP-CORE-007
    priority: SHOULD
    ac_ref: CORE-AC-018
    title: "getAdQueryString auto-inyecta ppid/rdid/idtype/is_lat"
    suggested_spec: "unit/AdQueryStringTest.kt"
    notes: >
      Test unitario puro de MediastreamPlayerConfig.getAdQueryString: verificar
      inyección de ppid (fallback a customerID), idtype=aaid en 'android' y afai en
      'firetv', y que un valor ya presente en la URL NO se duplica (BR-CORE-023).
      No requiere dispositivo.

  - id: GAP-CORE-008
    priority: SHOULD
    ac_ref: CORE-AC-009
    title: "mergePersistentFrom preserva flags de UI y toma fuente/DVR/language del nuevo"
    suggested_spec: "unit/ConfigMergeTest.kt"
    notes: >
      Test unitario de mergePersistentFrom: verificar campo por campo qué viene del
      previo y qué del nuevo (BR-CORE-009/010). No requiere dispositivo.

  - id: GAP-CORE-009
    priority: COULD
    ac_ref: CORE-AC-016
    title: "getDeviceType retorna la categoría correcta"
    suggested_spec: "integration/DeviceTypeTest.kt"
    notes: >
      En BRAVIA debe retornar 'androidtv'; en móvil 'android'. @TVOnly / @MobileOnly
      según el dispositivo de ejecución.

  - id: GAP-CORE-010
    priority: COULD
    ac_ref: CORE-AC-019
    title: "startPiP entra en Picture-in-Picture en Android O+"
    suggested_spec: "integration/PipTest.kt"
    notes: >
      @MobileOnly (TV no soporta PiP de la misma forma). Verificar entrada a PiP y
      propagación de onPictureInPictureModeChanged(true).

  - id: GAP-CORE-011
    priority: COULD
    ac_ref: CORE-AC-021
    title: "isVodCase true cuando dvrStart y dvrEnd están definidos"
    suggested_spec: "unit/IsVodCaseTest.kt"
    notes: >
      Difícil de aislar como unit (depende de msConfig interno). Alternativa: test
      instrumentado construyendo con dvrStart/dvrEnd y leyendo isVodCase().
